version: "3.9"

# ─────────────────────────────────────────────
#  LexAI — Docker Compose Production Stack
#  Services: api, frontend, postgres, qdrant, nginx
# ─────────────────────────────────────────────

networks:
  lexai-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_storage:
  uploads_vol:
  nginx_certs:

services:

  # ── API (FastAPI) ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    container_name: lexai-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://lexai:${POSTGRES_PASSWORD}@postgres:5432/lexai
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: lexai_playbooks
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-70b-versatile
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: lexai-production
      LANGSMITH_TRACING: "true"
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      JWT_ALGORITHM: RS256
      SECRET_KEY: ${SECRET_KEY}
      RISK_APPROVAL_THRESHOLD: "80"
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: '["https://app.lexai.com", "http://localhost:3000"]'
      RATE_LIMIT_PER_MINUTE: "100"
    volumes:
      - uploads_vol:/app/uploads
      - ./keys:/app/keys:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Nginx serving static HTML) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: lexai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexai
      POSTGRES_USER: lexai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexai -d lexai"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c log_min_duration_statement=1000

  # ── Qdrant Vector Database ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.1
    container_name: lexai-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - lexai-net

  # ── Nginx Reverse Proxy (Production) ───────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: lexai-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    networks:
      - lexai-net

  # ── DB Migrations (one-shot) ───────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    container_name: lexai-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://lexai:${POSTGRES_PASSWORD}@postgres:5432/lexai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lexai-net
    restart: "no"

  # ── Playbook Seeder (one-shot) ─────────────────────────────
  seed:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.api
    container_name: lexai-seed
    command: ["python", "-m", "scripts.seed_playbooks"]
    environment:
      DATABASE_URL: postgresql+asyncpg://lexai:${POSTGRES_PASSWORD}@postgres:5432/lexai
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: lexai_playbooks
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    networks:
      - lexai-net
    restart: "no"
